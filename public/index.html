<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MELI Search - Buscador Avanzado de Inmuebles</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
:root {
  --bg: #0a0a1a; --card: #12122a; --surface: #1a1a3e; --border: #2a2a5a;
  --text: #e8e8f0; --muted: #7878a0; --yellow: #ffe600; --blue: #3483fa;
  --green: #00c853; --red: #ff3d5a; --orange: #ff8c00; --purple: #9c27b0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); }
::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.header { background:linear-gradient(135deg,var(--yellow),#f0c800); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; }
.header-left { display:flex; align-items:center; gap:12px; }
.header h1 { color:#1a1a1a; font-size:20px; font-weight:800; }
.header .sub { color:#555; font-size:12px; }
.header-right { display:flex; gap:8px; }
.badge { background:rgba(0,0,0,0.15); color:#333; padding:4px 10px; border-radius:12px; font-size:11px; font-weight:600; }

.layout { display:grid; grid-template-columns:300px 1fr; min-height:calc(100vh - 52px); }
.sidebar { background:var(--card); padding:16px; overflow-y:auto; border-right:1px solid var(--border); }
.main { padding:20px; overflow-y:auto; }

.section { margin-bottom:16px; }
.section-title { font-size:11px; text-transform:uppercase; letter-spacing:1.2px; color:var(--yellow); margin-bottom:8px; font-weight:700; display:flex; align-items:center; gap:6px; }
.row { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:6px; }
.row.full { grid-template-columns:1fr; }

input,select { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:8px 10px; border-radius:6px; font-size:12px; width:100%; }
input:focus,select:focus { outline:none; border-color:var(--blue); }
input::placeholder { color:var(--muted); }
select { cursor:pointer; }

.btn { padding:10px; border:none; border-radius:8px; font-weight:700; cursor:pointer; font-size:13px; width:100%; transition:all .15s; }
.btn-primary { background:var(--blue); color:#fff; }
.btn-primary:hover { background:#2868c8; }
.btn-primary:disabled { opacity:.4; }
.btn-outline { background:transparent; color:var(--yellow); border:1px solid var(--yellow); margin-top:6px; font-size:12px; padding:8px; }
.btn-outline:hover { background:rgba(255,230,0,.08); }

.profile-box { background:var(--surface); border-radius:8px; padding:12px; margin-bottom:16px; border-left:3px solid var(--yellow); }
.profile-box h4 { font-size:12px; color:var(--yellow); margin-bottom:6px; }
.profile-box p { font-size:11px; color:var(--muted); line-height:1.5; }
.tag { display:inline-block; background:rgba(52,131,250,.15); color:var(--blue); padding:2px 7px; border-radius:8px; font-size:10px; margin:2px 2px 0 0; }

.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:16px; }
.stat { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; }
.stat .label { font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); }
.stat .val { font-size:22px; font-weight:800; margin-top:4px; }
.stat .val.y { color:var(--yellow); } .stat .val.g { color:var(--green); } .stat .val.r { color:var(--red); } .stat .val.b { color:var(--blue); }
.stat .sub { font-size:10px; color:var(--muted); margin-top:2px; }

.toolbar { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
.tbtn { padding:7px 14px; background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:6px; cursor:pointer; font-size:12px; display:flex; align-items:center; gap:5px; }
.tbtn:hover { border-color:var(--blue); color:var(--blue); }
.tbtn.active { background:var(--blue); border-color:var(--blue); color:#fff; }
.spacer { flex:1; }
.result-count { font-size:12px; color:var(--muted); }

/* Cards */
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; transition:all .2s; position:relative; }
.card:hover { border-color:var(--blue); transform:translateY(-3px); box-shadow:0 8px 30px rgba(0,0,0,.4); }
.card-img { width:100%; height:180px; object-fit:cover; background:var(--surface); }
.card-body { padding:12px; }
.card-title { font-weight:700; font-size:14px; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-price { font-size:16px; font-weight:800; color:var(--yellow); margin:6px 0; }
.card-desc { font-size:11px; color:var(--muted); line-height:1.4; }
.card-meta { font-size:10px; color:var(--muted); margin-top:8px; display:flex; gap:8px; flex-wrap:wrap; }

.loading { text-align:center; padding:20px; color:var(--muted); }
.spinner { display:inline-block; width:20px; height:20px; border:3px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

.error { background:rgba(255,61,90,.15); border:1px solid var(--red); color:var(--red); padding:12px; border-radius:8px; font-size:12px; }
.warning { background:rgba(255,140,0,.15); border:1px solid var(--orange); color:var(--orange); padding:12px; border-radius:8px; font-size:12px; }
.success { background:rgba(0,200,83,.15); border:1px solid var(--green); color:var(--green); padding:12px; border-radius:8px; font-size:12px; }

.pagination { display:flex; gap:6px; align-items:center; justify-content:center; margin-top:20px; }
.pagination button { padding:6px 12px; background:var(--card); border:1px solid var(--border); color:var(--text); border-radius:4px; cursor:pointer; font-size:11px; }
.pagination button:hover { border-color:var(--blue); }
.pagination button.active { background:var(--blue); border-color:var(--blue); color:#fff; }
.pagination button:disabled { opacity:.3; cursor:not-allowed; }

/* Responsive */
@media (max-width:768px) {
  .layout { grid-template-columns:1fr; }
  .sidebar { display:none; }
  .grid { grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); }
  .stats { grid-template-columns:repeat(2,1fr); }
}
@media (max-width:480px) {
  .grid { grid-template-columns:1fr; }
  .header { padding:10px; }
  .header h1 { font-size:16px; }
  .main { padding:12px; }
}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <i class="fas fa-search" style="font-size:24px;"></i>
    <div>
      <h1>MELI Search</h1>
      <span class="sub">Advanced Real Estate Finder</span>
    </div>
  </div>
  <div class="header-right">
    <span class="badge"><i class="fas fa-bolt"></i> ML-Powered</span>
    <span class="badge"><i class="fas fa-cloud"></i> Real-time</span>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <!-- Sidebar filters will be generated here -->
  </div>
  <div class="main">
    <div id="root"></div>
  </div>
</div>

<script type="text/babel">
const API_TIMEOUT = 8000;
const ML_API_URL = 'https://api-inference.huggingface.co/models/sentence-transformers/all-MiniLM-L6-v2';
const VERCEL_PROXY = 'https://meli-search.vercel.app/api/ml';
const SUPABASE_PROXY = 'https://meli-search-backup.supabase.co/functions/v1/ml-proxy';

async function queryMLAPI(query, huggingFaceToken) {
  try {
    console.log('Attempting ML API direct call...');
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), API_TIMEOUT);
    
    const response = await fetch(ML_API_URL, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${huggingFaceToken}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        inputs: query,
        parameters: { truncation: true }
      }),
      signal: controller.signal
    });
    
    clearTimeout(timeout);
    
    if (!response.ok) throw new Error(`ML API error: ${response.status}`);
    return await response.json();
  } catch (err) {
    console.warn('ML API direct call failed, trying Vercel proxy...', err.message);
    
    try {
      const proxyRes = await fetch(VERCEL_PROXY, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query })
      });
      
      if (!proxyRes.ok) throw new Error('Vercel proxy failed');
      return await proxyRes.json();
    } catch (proxyErr) {
      console.warn('Vercel proxy failed, trying Supabase proxy...', proxyErr.message);
      
      const supabaseRes = await fetch(SUPABASE_PROXY, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query })
      });
      
      if (!supabaseRes.ok) throw new Error('All ML API attempts failed');
      return await supabaseRes.json();
    }
  }
}

function App() {
  const [listings, setListings] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const [filters, setFilters] = React.useState({
    city: '',
    priceMin: '',
    priceMax: '',
    bedrooms: '',
    property_type: '',
    query: ''
  });
  const [paging, setPaging] = React.useState({ offset: 0, limit: 50 });
  const [stats, setStats] = React.useState({ total: 0, avg_price: 0, listings_shown: 0 });
  const [sortBy, setSortBy] = React.useState('price');

  const handleFilterChange = (e) => {
    const { name, value } = e.target;
    setFilters(prev => ({ ...prev, [name]: value }));
  };

  const search = async (offset = 0) => {
    setLoading(true);
    setError('');
    setPaging(prev => ({ ...prev, offset }));

    try {
      const params = new URLSearchParams({
        q: filters.query || filters.city || 'inmuebles',
        offset: offset,
        limit: paging.limit,
        ...(filters.priceMin && { price_min: filters.priceMin }),
        ...(filters.priceMax && { price_max: filters.priceMax }),
        ...(filters.property_type && { category: filters.property_type }),
        sort: sortBy
      });

      const response = await fetch(
        `https://api.mercadolibre.com/sites/MLA/search?${params}`,
        { signal: AbortSignal.timeout(10000) }
      );

      if (!response.ok) throw new Error('API request failed');
      const data = await response.json();

      // Process and enhance with ML embeddings if query provided
      let enhanced = data.results || [];
      if (filters.query && data.results?.length > 0) {
        const huggingFaceToken = localStorage.getItem('hf_token') || '';
        if (huggingFaceToken) {
          try {
            const embeddings = await queryMLAPI(filters.query, huggingFaceToken);
            console.log('Embeddings received:', embeddings);
          } catch (mlErr) {
            console.warn('ML enrichment skipped:', mlErr.message);
          }
        }
      }

      setListings(enhanced);
      
      // Calculate stats
      const prices = enhanced
        .map(item => parseFloat(item.price) || 0)
        .filter(p => p > 0);
      const avgPrice = prices.length > 0
        ? Math.round(prices.reduce((a, b) => a + b) / prices.length)
        : 0;

      setStats({
        total: data.paging?.total || 0,
        avg_price: avgPrice,
        listings_shown: enhanced.length
      });
    } catch (err) {
      setError(err.message || 'Search failed');
      console.error('Search error:', err);
    } finally {
      setLoading(false);
    }
  };

  const curPage = Math.floor(paging.offset / paging.limit) + 1;
  const totalPages = Math.ceil(stats.total / paging.limit) || 1;

  React.useEffect(() => {
    search(0);
  }, []);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
      {/* Sidebar Filters */}
      <div style={{ gridColumn: '1', background: 'var(--card)', padding: '16px', borderRadius: '8px', border: '1px solid var(--border)' }}>
        <h3 style={{ color: 'var(--yellow)', marginBottom: '14px', fontSize: '13px', fontWeight: '700' }}>
          <i className="fas fa-sliders-h" style={{ marginRight: '6px' }}></i> Filtros
        </h3>

        <div className="section">
          <label style={{ fontSize: '11px', color: 'var(--muted)', display: 'block', marginBottom: '4px' }}>Búsqueda</label>
          <input
            type="text"
            name="query"
            placeholder="Ej: departamento, casa..."
            value={filters.query}
            onChange={handleFilterChange}
            onKeyPress={(e) => e.key === 'Enter' && search(0)}
          />
        </div>

        <div className="section">
          <label style={{ fontSize: '11px', color: 'var(--muted)', display: 'block', marginBottom: '4px' }}>Ciudad</label>
          <input
            type="text"
            name="city"
            placeholder="Ciudad..."
            value={filters.city}
            onChange={handleFilterChange}
          />
        </div>

        <div className="row">
          <div>
            <label style={{ fontSize: '11px', color: 'var(--muted)', display: 'block', marginBottom: '4px' }}>Precio Min</label>
            <input
              type="number"
              name="priceMin"
              placeholder="Min"
              value={filters.priceMin}
              onChange={handleFilterChange}
            />
          </div>
          <div>
            <label style={{ fontSize: '11px', color: 'var(--muted)', display: 'block', marginBottom: '4px' }}>Precio Max</label>
            <input
              type="number"
              name="priceMax"
              placeholder="Max"
              value={filters.priceMax}
              onChange={handleFilterChange}
            />
          </div>
        </div>

        <div className="section">
          <label style={{ fontSize: '11px', color: 'var(--muted)', display: 'block', marginBottom: '4px' }}>Dormitorios</label>
          <select name="bedrooms" value={filters.bedrooms} onChange={handleFilterChange}>
            <option value="">Todos</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4+</option>
          </select>
        </div>

        <div className="section">
          <label style={{ fontSize: '11px', color: 'var(--muted)', display: 'block', marginBottom: '4px' }}>Tipo de Propiedad</label>
          <select name="property_type" value={filters.property_type} onChange={handleFilterChange}>
            <option value="">Todos</option>
            <option value="department">Departamento</option>
            <option value="house">Casa</option>
            <option value="land">Terreno</option>
            <option value="commerce">Local Comercial</option>
          </select>
        </div>

        <button className="btn btn-primary" onClick={() => search(0)}>
          <i className="fas fa-search"></i> Buscar
        </button>
        <button className="btn btn-outline" onClick={() => {
          setFilters({ city: '', priceMin: '', priceMax: '', bedrooms: '', property_type: '', query: '' });
          setListings([]);
        }}>
          Limpiar
        </button>
      </div>

      {/* Main Content */}
      <div style={{ gridColumn: '2' }}>
        {/* Stats */}
        <div className="stats" style={{ marginBottom: '20px' }}>
          <div className="stat">
            <div className="label">Resultados Totales</div>
            <div className="val y">{stats.total.toLocaleString()}</div>
          </div>
          <div className="stat">
            <div className="label">Precio Promedio</div>
            <div className="val g">${stats.avg_price.toLocaleString()}</div>
          </div>
          <div className="stat">
            <div className="label">Mostrados en esta página</div>
            <div className="val b">{stats.listings_shown}</div>
          </div>
        </div>

        {/* Toolbar */}
        <div className="toolbar">
          <label style={{ fontSize: '12px', color: 'var(--muted)' }}>Ordenar:</label>
          <select
            value={sortBy}
            onChange={(e) => {
              setSortBy(e.target.value);
              search(0);
            }}
            style={{ width: 'auto', padding: '6px 10px' }}
          >
            <option value="price">Precio Asc</option>
            <option value="price_desc">Precio Desc</option>
            <option value="newest">Más Nuevos</option>
            <option value="relevance">Relevancia</option>
          </select>
          <span className="spacer"></span>
          <span className="result-count">{listings.length} de {stats.total} resultados</span>
        </div>

        {/* Error message */}
        {error && <div className="error"><i className="fas fa-exclamation-circle"></i> {error}</div>}

        {/* Loading state */}
        {loading && <div className="loading"><div className="spinner"></div> Cargando...</div>}

        {/* Results Grid */}
        {!loading && listings.length > 0 && (
          <div>
            <div className="grid">
              {listings.map((item, idx) => (
                <div key={idx} className="card">
                  <img
                    src={item.thumbnail || 'https://via.placeholder.com/320x180?text=Sin+imagen'}
                    alt={item.title}
                    className="card-img"
                    onError={(e) => { e.target.src = 'https://via.placeholder.com/320x180?text=Error+Imagen'; }}
                  />
                  <div className="card-body">
                    <div className="card-title">{item.title}</div>
                    <div className="card-price">${item.price?.toLocaleString() || 'N/A'}</div>
                    <div className="card-desc">
                      {item.category_id && <span className="tag">{item.category_id}</span>}
                      {item.location && <span className="tag">{item.location.city?.name}</span>}
                    </div>
                    <div className="card-meta">
                      <span><i className="fas fa-user"></i> {item.seller?.id || 'Privado'}</span>
                      <span><i className="fas fa-calendar"></i> {new Date(item.created_at).toLocaleDateString()}</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Pagination */}
            {totalPages > 1 && (
              <div className="pagination">
                <button disabled={curPage<=1} onClick={()=>search(paging.offset-paging.limit)}><i className="fas fa-chevron-left"></i></button>
                <button className="active" disabled>Pag {curPage} / {totalPages}</button>
                <button disabled={curPage>=totalPages} onClick={()=>search(paging.offset+paging.limit)}><i className="fas fa-chevron-right"></i></button>
              </div>
            )}
          </div>
        )}

        {/* Empty state */}
        {!loading && listings.length === 0 && !error && (
          <div style={{ textAlign: 'center', padding: '40px', color: 'var(--muted)' }}>
            <i className="fas fa-search" style={{ fontSize: '48px', marginBottom: '12px', opacity: 0.3 }}></i>
            <p>No hay resultados. Intenta con otros filtros.</p>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
