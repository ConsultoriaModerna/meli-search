<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MELI Search - Buscador Avanzado de Inmuebles</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
:root {
  --bg: #0a0a1a; --card: #12122a; --surface: #1a1a3e; --border: #2a2a5a;
  --text: #e8e8f0; --muted: #7878a0; --yellow: #ffe600; --blue: #3483fa;
  --green: #00c853; --red: #ff3d5a; --orange: #ff8c00; --purple: #9c27b0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); }
::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.header { background:linear-gradient(135deg,var(--yellow),#f0c800); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; }
.header-left { display:flex; align-items:center; gap:12px; }
.header h1 { color:#1a1a1a; font-size:20px; font-weight:800; }
.header .sub { color:#555; font-size:12px; }
.header-right { display:flex; gap:8px; }
.badge { background:rgba(0,0,0,0.15); color:#333; padding:4px 10px; border-radius:12px; font-size:11px; font-weight:600; }

.layout { display:grid; grid-template-columns:300px 1fr; min-height:calc(100vh - 52px); }
.sidebar { background:var(--card); padding:16px; overflow-y:auto; border-right:1px solid var(--border); }
.main { padding:20px; overflow-y:auto; }

.section { margin-bottom:16px; }
.section-title { color:var(--text); font-size:13px; font-weight:700; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px; }
.input-group { margin-bottom:12px; display:flex; flex-direction:column; gap:4px; }
.input-group label { color:var(--muted); font-size:11px; font-weight:600; }
.input-group input, .input-group select { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:6px; font-size:13px; }
.input-group input:focus { outline:none; border-color:var(--blue); }
.input-group input::placeholder { color:var(--muted); }

.btn { padding:8px 16px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; transition:all 0.2s; }
.btn-primary { background:var(--yellow); color:#1a1a1a; }
.btn-primary:hover { opacity:0.9; }
.btn-secondary { background:var(--surface); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { background:var(--card); }
.btn-danger { background:var(--red); color:white; }
.btn-danger:hover { opacity:0.9; }
.btn:disabled { opacity:0.5; cursor:not-allowed; }

.property-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
.property-card { background:var(--card); border:1px solid var(--border); border-radius:8px; overflow:hidden; transition:all 0.3s; cursor:pointer; }
.property-card:hover { border-color:var(--yellow); transform:translateY(-4px); box-shadow:0 8px 24px rgba(255,230,0,0.1); }
.property-card-image { width:100%; height:180px; background:linear-gradient(135deg,var(--surface),var(--border)); position:relative; overflow:hidden; }
.property-card-image img { width:100%; height:100%; object-fit:cover; }
.property-card-price { position:absolute; top:8px; right:8px; background:var(--red); color:white; padding:6px 12px; border-radius:4px; font-weight:700; font-size:14px; }
.property-card-content { padding:12px; }
.property-card-title { color:var(--text); font-size:14px; font-weight:700; margin-bottom:6px; }
.property-card-location { color:var(--muted); font-size:12px; margin-bottom:8px; }
.property-card-details { display:flex; gap:12px; font-size:12px; color:var(--muted); margin-bottom:10px; }
.property-card-details span { display:flex; align-items:center; gap:4px; }
.property-card-link { color:var(--blue); font-size:12px; font-weight:600; text-decoration:none; }
.property-card-link:hover { text-decoration:underline; }

.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:16px; }
.stat-card { background:var(--surface); border:1px solid var(--border); padding:12px; border-radius:6px; }
.stat-label { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:0.5px; }
.stat-value { color:var(--text); font-size:24px; font-weight:700; margin:6px 0; }
.stat-change { color:var(--green); font-size:12px; }
.stat-change.negative { color:var(--red); }

.error-banner { background:rgba(255,61,90,0.1); border:1px solid var(--red); color:var(--red); padding:12px; border-radius:6px; margin-bottom:16px; font-size:13px; }
.success-banner { background:rgba(0,200,83,0.1); border:1px solid var(--green); color:var(--green); padding:12px; border-radius:6px; margin-bottom:16px; font-size:13px; }

.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:1000; }
.modal { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:24px; max-width:500px; width:90%; }
.modal-title { color:var(--text); font-size:18px; font-weight:700; margin-bottom:12px; }
.modal-close { position:absolute; top:16px; right:16px; background:none; border:none; color:var(--muted); cursor:pointer; font-size:20px; }

.tabs { display:flex; gap:8px; border-bottom:1px solid var(--border); margin-bottom:16px; }
.tab { background:none; border:none; color:var(--muted); padding:12px 16px; cursor:pointer; border-bottom:2px solid transparent; font-size:13px; font-weight:600; transition:all 0.2s; }
.tab.active { color:var(--yellow); border-bottom-color:var(--yellow); }
.tab:hover { color:var(--text); }

.loading { display:inline-block; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--yellow); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

.filter-panel { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:16px; }
.filter-panel-title { color:var(--text); font-size:14px; font-weight:700; margin-bottom:12px; }
.filter-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.filter-row.full { grid-template-columns:1fr; }

.pagination { display:flex; justify-content:center; gap:8px; margin-top:24px; }
.pagination button { padding:8px 12px; border:1px solid var(--border); background:var(--card); color:var(--text); border-radius:4px; cursor:pointer; font-size:13px; transition:all 0.2s; }
.pagination button:hover:not(:disabled) { border-color:var(--yellow); background:var(--surface); }
.pagination button.active { background:var(--yellow); color:#1a1a1a; }
.pagination button:disabled { opacity:0.5; cursor:not-allowed; }

.toast { position:fixed; bottom:20px; right:20px; background:var(--card); border:1px solid var(--border); padding:16px 24px; border-radius:8px; color:var(--text); font-size:14px; z-index:2000; max-width:300px; animation:slideIn 0.3s ease-out; }
@keyframes slideIn { from { transform:translateX(400px); opacity:0; } to { transform:translateX(0); opacity:1; } }
.toast.success { border-color:var(--green); color:var(--green); }
.toast.error { border-color:var(--red); color:var(--red); }

.responsive { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; }

@media (max-width:768px) {
  .layout { grid-template-columns:1fr; }
  .sidebar { display:none; }
  .property-grid { grid-template-columns:1fr; }
  .filter-row { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [searchParams, setSearchParams] = useState({ tipo: 'apartamento', precioMin: '', precioMax: '', ciudad: '', dormitorios: '', pagina: 1 });
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [totalPages, setTotalPages] = useState(0);
  const [curPage, setCurPage] = useState(1);
  const [paging, setPaging] = useState({ offset: 0, limit: 20 });
  const [statistics, setStatistics] = useState({});
  const [filterOpen, setFilterOpen] = useState(true);
  const [sortBy, setSortBy] = useState('published');

  const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3001' : 'https://meli-search.vercel.app';
  const ML_API = 'https://api.mercadolibre.com/sites/MLV/search';
  const SUPABASE_PROXY = 'https://meli-search.vercel.app/api/proxy';

  const search = async (offset = 0) => {
    if (!searchParams.ciudad.trim()) {
      setError('Por favor ingresa una ciudad');
      return;
    }

    setLoading(true);
    setError('');
    setResults([]);

    try {
      const queryParams = new URLSearchParams({
        q: searchParams.ciudad,
        tipo: searchParams.tipo,
        precio_min: searchParams.precioMin || '',
        precio_max: searchParams.precioMax || '',
        dormitorios: searchParams.dormitorios || '',
        offset: offset,
        limit: paging.limit,
        sort: sortBy
      });

      const response = await fetch(`${SUPABASE_PROXY}?${queryParams}`, {
        method: 'GET',
        headers: {
          'Authorization': `Bearer ${process.env.REACT_APP_SUPABASE_TOKEN || localStorage.getItem('auth_token') || ''}`,
          'Content-Type': 'application/json',
          'Referrer-Policy': 'no-referrer'
        }
      });

      if (!response.ok) throw new Error(`API error: ${response.status}`);
      const data = await response.json();

      setResults(data.results || []);
      setStatistics(data.statistics || {});
      setTotalPages(Math.ceil((data.paging?.total || 0) / paging.limit));
      setCurPage(Math.floor(offset / paging.limit) + 1);
      setPaging(data.paging || { offset, limit: paging.limit });
    } catch (err) {
      setError(`Error en búsqueda: ${err.message}`);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div>
      <div className="header">
        <div className="header-left">
          <i className="fas fa-home" style={{ fontSize: '24px', color: '#1a1a1a' }}</i>
          <div>
            <h1>MELI Search</h1>
            <div className="sub">Buscador Avanzado de Inmuebles</div>
          </div>
        </div>
        <div className="header-right">
          <div className="badge">MLV API</div>
          <div className="badge">Real-time</div>
        </div>
      </div>

      <div className="layout">
        <div className="sidebar">
          <div className="section">
            <div className="section-title">Búsqueda Rápida</div>
            <div className="input-group">
              <label>Tipo de Propiedad</label>
              <select value={searchParams.tipo} onChange={(e) => setSearchParams({...searchParams, tipo: e.target.value})}>
                <option value="apartamento">Apartamento</option>
                <option value="casa">Casa</option>
                <option value="terreno">Terreno</option>
              </select>
            </div>
            <div className="input-group">
              <label>Ciudad</label>
              <input type="text" placeholder="Ej: Caracas, Maracaibo" value={searchParams.ciudad} onChange={(e) => setSearchParams({...searchParams, ciudad: e.target.value})} onKeyPress={(e) => e.key === 'Enter' && search()} />
            </div>
            <div className="input-group">
              <label>Dormitorios (opcional)</label>
              <input type="number" placeholder="2" value={searchParams.dormitorios} onChange={(e) => setSearchParams({...searchParams, dormitorios: e.target.value})} />
            </div>
            <div className="input-group">
              <label>Precio Mínimo</label>
              <input type="number" placeholder="0" value={searchParams.precioMin} onChange={(e) => setSearchParams({...searchParams, precioMin: e.target.value})} />
            </div>
            <div className="input-group">
              <label>Precio Máximo</label>
              <input type="number" placeholder="1000000" value={searchParams.precioMax} onChange={(e) => setSearchParams({...searchParams, precioMax: e.target.value})} />
            </div>
            <button className="btn btn-primary" onClick={() => search()} style={{ width: '100%', marginTop: '8px' }}>
              {loading ? <span className="loading"></span> : <i className="fas fa-search"></i>}
              {!loading ? ' Buscar' : ' Buscando...'}
            </button>
          </div>

          <div className="section">
            <div className="section-title">Ordenar por</div>
            <div className="input-group">
              <select value={sortBy} onChange={(e) => setSortBy(e.target.value)}>
                <option value="published">Más Recientes</option>
                <option value="price_asc">Precio (menor a mayor)</option>
                <option value="price_desc">Precio (mayor a menor)</option>
              </select>
            </div>
          </div>
        </div>

        <div className="main">
          {error && <div className="error-banner"><i className="fas fa-exclamation-circle"></i> {error}</div>}
          
          {statistics && Object.keys(statistics).length > 0 && (
            <div className="stats-grid">
              <div className="stat-card">
                <div className="stat-label">Total Resultados</div>
                <div className="stat-value">{statistics.total_results || 0}</div>
              </div>
              <div className="stat-card">
                <div className="stat-label">Precio Promedio</div>
                <div className="stat-value">${(statistics.average_price || 0).toFixed(0)}</div>
              </div>
              <div className="stat-card">
                <div className="stat-label">Precio Mínimo</div>
                <div className="stat-value">${(statistics.min_price || 0).toFixed(0)}</div>
              </div>
              <div className="stat-card">
                <div className="stat-label">Precio Máximo</div>
                <div className="stat-value">${(statistics.max_price || 0).toFixed(0)}</div>
              </div>
            </div>
          )}

          {loading && (
            <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', minHeight: '400px' }}>
              <div>
                <div className="loading" style={{ width: '48px', height: '48px', margin: '0 auto 16px' }}</div>
                <p style={{ color: 'var(--muted)', textAlign: 'center' }}>Cargando resultados...</p>
              </div>
            </div>
          )}

          {!loading && results.length === 0 && !error && (
            <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', minHeight: '400px' }}>
              <p style={{ color: 'var(--muted)' }}>Realiza una búsqueda para ver resultados</p>
            </div>
          )}

          {!loading && results.length > 0 && (
            <div>
              <div style={{ color: 'var(--muted)', marginBottom: '16px', fontSize: '13px' }}>Se encontraron {paging?.total || 0} resultados</div>
              <div className="property-grid">
                {results.map((prop, idx) => (
                  <div key={idx} className="property-card">
                    <div className="property-card-image">
                      {prop.thumbnail && <img src={prop.thumbnail} alt={prop.title} onerror="this.src='https://via.placeholder.com/280x180?text=Sin+Imagen'" />
                      }
                      {prop.price && <div className="property-card-price">${prop.price.toLocaleString()}</div>}
                    </div>
                    <div className="property-card-content">
                      <div className="property-card-title">{prop.title}</div>
                      <div className="property-card-location"><i className="fas fa-map-marker-alt"></i> {prop.location}</div>
                      <div className="property-card-details">
                        {prop.bedrooms && <span><i className="fas fa-bed"></i> {prop.bedrooms} dorms</span>}
                        {prop.bathrooms && <span><i className="fas fa-bath"></i> {prop.bathrooms} baños</span>}
                        {prop.area && <span><i className="fas fa-ruler-combined"></i> {prop.area} m²</span>}
                      </div>
                      <a href={prop.url} target="_blank" rel="noopener noreferrer" className="property-card-link">Ver en MercadoLibre →</a>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {!loading && totalPages > 1 && (
            <div className="pagination">
              <button disabled={curPage<=1} onClick={()=>search(paging.offset-paging.limit)}><i className="fas fa-chevron-left"></i></button>
              <button className="active" disabled>Pag {curPage} / {totalPages}</button>
              <button disabled={curPage>=totalPages} onClick={()=>search(paging.offset+paging.limit)}><i className="fas fa-chevron-right"></i></button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
