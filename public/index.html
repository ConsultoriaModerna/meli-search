<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MELI Search - Buscador Avanzado de Inmuebles</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
:root {
  --bg: #0a0a1a; --card: #12122a; --surface: #1a1a3e; --border: #2a2a5a;
  --text: #e8e8f0; --muted: #7878a0; --yellow: #ffe600; --blue: #3483fa;
  --green: #00c853; --red: #ff3d5a; --orange: #ff8c00; --purple: #9c27b0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); }
::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.header { background:linear-gradient(135deg,var(--yellow),#f0c800); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; }
.header-left { display:flex; align-items:center; gap:12px; }
.header h1 { color:#1a1a1a; font-size:20px; font-weight:800; }
.header .sub { color:#555; font-size:12px; }
.header-right { display:flex; gap:8px; }
.badge { background:rgba(0,0,0,0.15); color:#333; padding:4px 10px; border-radius:12px; font-size:11px; font-weight:600; }

.layout { display:grid; grid-template-columns:300px 1fr; min-height:calc(100vh - 52px); }
.sidebar { background:var(--card); padding:16px; overflow-y:auto; border-right:1px solid var(--border); }
.main { padding:20px; overflow-y:auto; }

.section { margin-bottom:16px; }
.section-title { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; margin-bottom:10px; letter-spacing:0.5px; }
.filter-group { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
.input-group { display:flex; flex-direction:column; gap:4px; }
.input-group label { font-size:11px; color:var(--muted); }
.input-group input, .input-group select { padding:8px; background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:6px; font-size:12px; }
.input-group input:focus, .input-group select:focus { outline:none; border-color:var(--yellow); box-shadow:0 0 0 2px rgba(255,230,0,0.1); }

.btn { padding:8px 12px; border:none; border-radius:6px; font-weight:600; font-size:12px; cursor:pointer; transition:all 0.2s; }
.btn-primary { background:var(--yellow); color:#1a1a1a; }
.btn-primary:hover { background:#f0c800; transform:translateY(-1px); }
.btn-secondary { background:var(--surface); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { background:var(--border); }
.btn-danger { background:var(--red); color:#fff; }
.btn-success { background:var(--green); color:#000; }

.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; margin-bottom:20px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:8px; overflow:hidden; transition:all 0.2s; }
.card:hover { border-color:var(--yellow); box-shadow:0 8px 24px rgba(255,230,0,0.1); }
.card-header { background:var(--surface); padding:12px; border-bottom:1px solid var(--border); }
.card-header h3 { font-size:14px; margin-bottom:4px; }
.card-score { font-size:11px; color:var(--muted); }
.card-body { padding:12px; }
.card-body p { font-size:12px; color:var(--muted); margin-bottom:8px; }
.price-display { font-size:16px; font-weight:700; color:var(--yellow); margin:8px 0; }
.metrics { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin:12px 0; }
.metric { background:var(--surface); padding:8px; border-radius:4px; }
.metric-label { font-size:10px; color:var(--muted); }
.metric-value { font-size:13px; font-weight:700; color:var(--text); }
.price-m2 { color:var(--green); }
.price-range { color:var(--orange); }
.location-match { color:var(--blue); }
.score-badge { display:inline-block; padding:4px 8px; border-radius:4px; font-size:10px; font-weight:700; margin-right:4px; margin-top:4px; }
.score-excellent { background:rgba(0,200,83,0.2); color:var(--green); }
.score-good { background:rgba(52,131,250,0.2); color:var(--blue); }
.score-fair { background:rgba(255,140,0,0.2); color:var(--orange); }
.score-poor { background:rgba(255,61,90,0.2); color:var(--red); }
.card-footer { padding:12px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
.card-footer button { flex:1; }

.stats-container { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-bottom:20px; }
.stat-box { background:var(--card); border:1px solid var(--border); padding:16px; border-radius:8px; }
.stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; }
.stat-value { font-size:24px; font-weight:700; color:var(--yellow); margin-top:8px; }

.modal { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:1000; }
.modal-content { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:24px; max-width:600px; max-height:80vh; overflow-y:auto; }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.modal-header h2 { font-size:16px; }
.close-btn { background:none; border:none; color:var(--text); font-size:20px; cursor:pointer; }

.compare-table { width:100%; border-collapse:collapse; }
.compare-table th, .compare-table td { padding:12px; border:1px solid var(--border); text-align:left; font-size:12px; }
.compare-table th { background:var(--surface); font-weight:700; }
.compare-table tr:nth-child(even) { background:var(--surface); }

.toast { position:fixed; bottom:20px; right:20px; background:var(--surface); border:1px solid var(--border); padding:12px 16px; border-radius:6px; font-size:12px; max-width:300px; }
.toast.success { border-color:var(--green); }
.toast.error { border-color:var(--red); }

.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; color:var(--muted); text-align:center; }
.empty-state i { font-size:48px; margin-bottom:16px; opacity:0.3; }

.loading { display:flex; justify-content:center; align-items:center; padding:40px; }
.spinner { border:3px solid var(--border); border-top:3px solid var(--yellow); border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; }
@keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }

.action-bar { background:var(--surface); padding:12px; border-radius:6px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }

.zone-selector { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
.zone-btn { padding:6px 12px; background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:6px; font-size:11px; cursor:pointer; transition:all 0.2s; }
.zone-btn.active { background:var(--yellow); color:#1a1a1a; border-color:var(--yellow); }
.zone-btn:hover { border-color:var(--yellow); }

.price-input-group { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

.sort-controls { display:flex; gap:8px; margin-bottom:16px; }
.sort-btn { padding:8px 12px; background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:6px; font-size:12px; cursor:pointer; transition:all 0.2s; }
.sort-btn.active { background:var(--yellow); color:#1a1a1a); }
.sort-btn:hover { border-color:var(--yellow); }

.info-banner { background:rgba(52,131,250,0.1); border-left:4px solid var(--blue); padding:12px; border-radius:4px; margin-bottom:16px; font-size:12px; color:var(--text); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

// Benchmarks data for different zones
const ZONE_BENCHMARKS = {
  'Nordelta': { avgPrice: 4500, avgM2: 8500, confidence: 0.92 },
  'Olivos': { avgPrice: 5200, avgM2: 9200, confidence: 0.88 },
  'San Isidro': { avgPrice: 6100, avgM2: 10500, confidence: 0.91 },
  'La Boca': { avgPrice: 3800, avgM2: 7200, confidence: 0.85 },
  'Recoleta': { avgPrice: 5800, avgM2: 9800, confidence: 0.90 },
  'Palermo': { avgPrice: 5100, avgM2: 8900, confidence: 0.87 },
  'Caballito': { avgPrice: 4200, avgM2: 7800, confidence: 0.84 },
  'Belgrano': { avgPrice: 4800, avgM2: 8400, confidence: 0.86 },
};

// Scoring function - evaluates property based on multiple factors
const computeScore = (property, zone) => {
  let score = 0;
  let factors = [];
  
  const benchmark = ZONE_BENCHMARKS[zone];
  if (!benchmark) return { score: 0, factors: ['Unknown zone'] };
  
  // Price vs market (40% weight)
  const priceM2 = property.price / (property.area || 1);
  const marketM2 = benchmark.avgM2;
  const priceDiff = ((marketM2 - priceM2) / marketM2) * 100;
  
  if (priceDiff > 20) {
    score += 40;
    factors.push('Excellent price: ' + priceDiff.toFixed(1) + '% below market');
  } else if (priceDiff > 10) {
    score += 30;
    factors.push('Good price: ' + priceDiff.toFixed(1) + '% below market');
  } else if (priceDiff > 0) {
    score += 20;
    factors.push('Fair price: ' + priceDiff.toFixed(1) + '% below market');
  } else if (priceDiff > -10) {
    score += 10;
    factors.push('Slightly above market');
  } else {
    score += 0;
    factors.push('Well above market');
  }
  
  // Property features (30% weight)
  if (property.rooms >= 3) {
    score += 15;
    factors.push('Good size: ' + property.rooms + ' rooms');
  } else if (property.rooms >= 2) {
    score += 10;
    factors.push('Adequate size: ' + property.rooms + ' rooms');
  }
  
  if (property.parking) {
    score += 10;
    factors.push('Has parking');
  }
  
  if (property.amenities && property.amenities.length > 0) {
    score += 5;
    factors.push('Has amenities: ' + property.amenities.join(', '));
  }
  
  // Location quality (20% weight)
  if (benchmark.confidence > 0.90) {
    score += 15;
    factors.push('Premium zone');
  } else if (benchmark.confidence > 0.85) {
    score += 10;
    factors.push('Good zone');
  } else {
    score += 5;
    factors.push('Established zone');
  }
  
  // Time on market penalty (10% weight)
  if (property.daysOnMarket > 180) {
    score -= 10;
    factors.push('Long on market: ' + property.daysOnMarket + ' days');
  } else if (property.daysOnMarket > 90) {
    score -= 5;
    factors.push('Moderate market time: ' + property.daysOnMarket + ' days');
  }
  
  score = Math.max(0, Math.min(100, score));
  
  return { score: Math.round(score), factors };
};

// Price vs market calculation
const calculatePriceVsMarket = (property, zone) => {
  const benchmark = ZONE_BENCHMARKS[zone];
  if (!benchmark) return null;
  
  const priceM2 = property.price / (property.area || 1);
  const diff = ((benchmark.avgM2 - priceM2) / benchmark.avgM2) * 100;
  return {
    yourPrice: priceM2.toFixed(0),
    marketPrice: benchmark.avgM2,
    difference: diff.toFixed(1)
  };
};

// Sample data with smart enrichment
const generateSampleProperties = () => [
  { id: 1, title: 'Dept 2-Amb Nordelta', price: 180000, area: 42, rooms: 2, parking: true, zone: 'Nordelta', daysOnMarket: 45, amenities: ['Pool', 'Gym'] },
  { id: 2, title: 'Casa 3-Amb Olivos', price: 320000, area: 55, rooms: 3, parking: true, zone: 'Olivos', daysOnMarket: 120, amenities: ['Patio', 'Garage'] },
  { id: 3, title: 'Dept 1-Amb San Isidro', price: 250000, area: 35, rooms: 1, parking: false, zone: 'San Isidro', daysOnMarket: 60, amenities: ['Balcony'] },
  { id: 4, title: 'Casa La Boca', price: 180000, area: 48, rooms: 2, parking: false, zone: 'La Boca', daysOnMarket: 200, amenities: ['Garden'] },
  { id: 5, title: 'Pent Recoleta', price: 420000, area: 65, rooms: 3, parking: true, zone: 'Recoleta', daysOnMarket: 30, amenities: ['Pool', 'Gym', 'Lounge'] },
];

// Export to CSV
const exportCSV = (properties, zone) => {
  let csv = 'ID,Title,Price,Area,M2,Rooms,Parking,Zone,Days On Market,Score,Score Details\n';
  
  properties.forEach(prop => {
    const { score, factors } = computeScore(prop, zone);
    const m2 = (prop.price / prop.area).toFixed(0);
    
    csv += `${prop.id},"${prop.title}",${prop.price},${prop.area},${m2},${prop.rooms},${prop.parking ? 'Yes' : 'No'},"${zone}",${prop.daysOnMarket},${score},"${factors.join('; ')}"\n`;
  });
  
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `meli-search-${zone}-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
};

// Main App Component
function App() {
  const [properties, setProperties] = useState(generateSampleProperties());
  const [selectedZone, setSelectedZone] = useState('Nordelta');
  const [priceRange, setPriceRange] = useState({ min: 0, max: 500000 });
  const [minArea, setMinArea] = useState(0);
  const [sortBy, setSortBy] = useState('score');
  const [compareMode, setCompareMode] = useState(false);
  const [selected, setSelected] = useState([]);
  const [showModal, setShowModal] = useState(false);
  const [modalContent, setModalContent] = useState(null);
  const [toast, setToast] = useState(null);

  const showToast = (message, type = 'success') => {
    setToast({ message, type });
    setTimeout(() => setToast(null), 3000);
  };

  const filteredAndSorted = useMemo(() => {
    let filtered = properties
      .filter(p => p.zone === selectedZone)
      .filter(p => p.price >= priceRange.min && p.price <= priceRange.max)
      .filter(p => p.area >= minArea);

    // Add scores
    filtered = filtered.map(p => ({
      ...p,
      scoreData: computeScore(p, selectedZone)
    }));

    // Sort
    filtered.sort((a, b) => {
      if (sortBy === 'score') return b.scoreData.score - a.scoreData.score;
      if (sortBy === 'price') return a.price - b.price;
      if (sortBy === 'area') return b.area - a.area;
      return 0;
    });

    return filtered;
  }, [properties, selectedZone, priceRange, minArea, sortBy]);

  const handleCompare = () => {
    if (selected.length === 0) {
      showToast('Please select properties to compare', 'error');
      return;
    }

    const compareData = selected.map(id => 
      filteredAndSorted.find(p => p.id === id)
    ).filter(Boolean);

    setModalContent(compareData);
    setShowModal(true);
  };

  const toggleSelect = (id) => {
    setSelected(prev => 
      prev.includes(id) 
        ? prev.filter(x => x !== id)
        : [...prev, id]
    );
  };

  const handleExport = () => {
    exportCSV(filteredAndSorted, selectedZone);
    showToast('CSV exported successfully');
  };

  const getScoreBadgeClass = (score) => {
    if (score >= 80) return 'score-excellent';
    if (score >= 60) return 'score-good';
    if (score >= 40) return 'score-fair';
    return 'score-poor';
  };

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <div className="header">
        <div className="header-left">
          <i className="fas fa-building" style={{ fontSize: '20px' }}></i>
          <div>
            <h1>MELI Search</h1>
            <div className="sub">Smart Property Search & Analysis</div>
          </div>
        </div>
        <div className="header-right">
          <span className="badge">ml-proxy Active</span>
          <span className="badge">browser-direct Mode</span>
        </div>
      </div>

      <div className="layout">
        {/* Sidebar */}
        <div className="sidebar">
          <div className="section">
            <div className="section-title">Zones</div>
            <div className="zone-selector">
              {Object.keys(ZONE_BENCHMARKS).map(zone => (
                <button
                  key={zone}
                  className={`zone-btn ${selectedZone === zone ? 'active' : ''}`}
                  onClick={() => setSelectedZone(zone)}
                >
                  {zone}
                </button>
              ))}
            </div>
          </div>

          <div className="section">
            <div className="section-title">Price Range (USD)</div>
            <div className="price-input-group">
              <input
                type="number"
                placeholder="Min"
                value={priceRange.min}
                onChange={(e) => setPriceRange({...priceRange, min: parseInt(e.target.value) || 0})}
              />
              <input
                type="number"
                placeholder="Max"
                value={priceRange.max}
                onChange={(e) => setPriceRange({...priceRange, max: parseInt(e.target.value) || 500000})}
              />
            </div>
          </div>

          <div className="section">
            <div className="section-title">Minimum Area (m²)</div>
            <input
              type="number"
              placeholder="0"
              value={minArea}
              onChange={(e) => setMinArea(parseInt(e.target.value) || 0)}
              style={{ width: '100%', padding: '8px', background: 'var(--surface)', border: '1px solid var(--border)', color: 'var(--text)', borderRadius: '6px' }}
            />
          </div>

          <div className="section">
            <div className="section-title">Sort By</div>
            <div className="zone-selector">
              {['score', 'price', 'area'].map(option => (
                <button
                  key={option}
                  className={`zone-btn ${sortBy === option ? 'active' : ''}`}
                  onClick={() => setSortBy(option)}
                  style={{ flex: 1, textTransform: 'capitalize' }}
                >
                  {option}
                </button>
              ))}
            </div>
          </div>

          <div className="section" style={{ marginTop: '16px' }}>
            <button className="btn btn-primary" style={{ width: '100%', marginBottom: '8px' }} onClick={handleCompare}>
              <i className="fas fa-exchange-alt"></i> Compare Selected
            </button>
            <button className="btn btn-secondary" style={{ width: '100%' }} onClick={handleExport}>
              <i className="fas fa-download"></i> Export CSV
            </button>
          </div>

          <div className="info-banner">
            <i className="fas fa-info-circle"></i> Smart scoring analyzes price vs market, property features, and location quality.
          </div>
        </div>

        {/* Main Content */}
        <div className="main">
          <div className="action-bar">
            <span style={{ fontSize: '12px', color: 'var(--muted)' }}>
              {filteredAndSorted.length} properties found in {selectedZone}
            </span>
            <div>
              {selected.length > 0 && (
                <span style={{ fontSize: '12px', color: 'var(--yellow)', marginRight: '8px' }}>
                  {selected.length} selected
                </span>
              )}
            </div>
          </div>

          {filteredAndSorted.length === 0 ? (
            <div className="empty-state">
              <i className="fas fa-search"></i>
              <p>No properties found matching your criteria</p>
            </div>
          ) : (
            <div className="grid">
              {filteredAndSorted.map(property => {
                const priceAnalysis = calculatePriceVsMarket(property, selectedZone);
                const isSelected = selected.includes(property.id);
                
                return (
                  <div key={property.id} className={`card card-score ${isSelected ? 'selected' : ''}`} style={{ 
                    border: isSelected ? '2px solid var(--yellow)' : '1px solid var(--border)',
                    opacity: isSelected ? 1 : 0.9 
                  }}>
                    <div className="card-header">
                      <input
                        type="checkbox"
                        checked={isSelected}
                        onChange={() => toggleSelect(property.id)}
                        style={{ marginRight: '8px', cursor: 'pointer' }}
                      />
                      <h3 style={{ display: 'inline-block' }}>{property.title}</h3>
                      <div className={`score-badge ${getScoreBadgeClass(property.scoreData.score)}`}>
                        Score: {property.scoreData.score}
                      </div>
                    </div>

                    <div className="card-body">
                      <div className="price-display">
                        ${property.price.toLocaleString()}
                      </div>

                      <div className="metrics">
                        <div className="metric">
                          <div className="metric-label">Area</div>
                          <div className="metric-value">{property.area} m²</div>
                        </div>
                        <div className="metric">
                          <div className="metric-label">USD/m²</div>
                          <div className="metric-value price-m2">${(property.price / property.area).toFixed(0)}</div>
                        </div>
                        <div className="metric">
                          <div className="metric-label">Rooms</div>
                          <div className="metric-value">{property.rooms}</div>
                        </div>
                        <div className="metric">
                          <div className="metric-label">Parking</div>
                          <div className="metric-value">{property.parking ? 'Yes' : 'No'}</div>
                        </div>
                      </div>

                      {priceAnalysis && (
                        <div style={{ fontSize: '11px', color: 'var(--muted)', marginTop: '8px', padding: '8px', background: 'var(--surface)', borderRadius: '4px' }}>
                          <div>Your Price/m²: <strong>${priceAnalysis.yourPrice}</strong></div>
                          <div>Market Avg/m²: <strong>${priceAnalysis.marketPrice}</strong></div>
                          <div className="price-range">
                            {priceAnalysis.difference > 0 ? (
                              <strong style={{ color: 'var(--green)' }}>✓ {priceAnalysis.difference}% below market</strong>
                            ) : (
                              <strong style={{ color: 'var(--orange)' }}>✗ {Math.abs(priceAnalysis.difference)}% above market</strong>
                            )}
                          </div>
                        </div>
                      )}

                      <div style={{ fontSize: '11px', color: 'var(--muted)', marginTop: '8px' }}>
                        <strong>Why this score:</strong>
                        <ul style={{ marginLeft: '16px', marginTop: '4px' }}>
                          {property.scoreData.factors.slice(0, 3).map((factor, i) => (
                            <li key={i}>{factor}</li>
                          ))}
                        </ul>
                      </div>
                    </div>

                    <div className="card-footer">
                      <button className="btn btn-secondary" style={{ flex: 1 }}>View Details</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* Comparison Modal */}
      {showModal && modalContent && (
        <div className="modal">
          <div className="modal-content">
            <div className="modal-header">
              <h2>Property Comparison</h2>
              <button className="close-btn" onClick={() => setShowModal(false)}>✕</button>
            </div>

            <table className="compare-table">
              <thead>
                <tr>
                  <th>Property</th>
                  {modalContent.map(p => <th key={p.id}>{p.title}</th>)}
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Price</td>
                  {modalContent.map(p => <td key={p.id}>${p.price.toLocaleString()}</td>)}
                </tr>
                <tr>
                  <td>Area (m²)</td>
                  {modalContent.map(p => <td key={p.id}>{p.area}</td>)}
                </tr>
                <tr>
                  <td>USD/m²</td>
                  {modalContent.map(p => <td key={p.id}>${(p.price / p.area).toFixed(0)}</td>)}
                </tr>
                <tr>
                  <td>Rooms</td>
                  {modalContent.map(p => <td key={p.id}>{p.rooms}</td>)}
                </tr>
                <tr>
                  <td>Parking</td>
                  {modalContent.map(p => <td key={p.id}>{p.parking ? 'Yes' : 'No'}</td>)}
                </tr>
                <tr>
                  <td>Score</td>
                  {modalContent.map(p => (
                    <td key={p.id} style={{ fontWeight: 700, color: 'var(--yellow)' }}>
                      {p.scoreData.score}
                    </td>
                  ))}
                </tr>
              </tbody>
            </table>

            <div style={{ marginTop: '16px', display: 'flex', gap: '8px', justifyContent: 'flex-end' }}>
              <button className="btn btn-secondary" onClick={() => setShowModal(false)}>Close</button>
            </div>
          </div>
        </div>
      )}

      {/* Toast Notification */}
      {toast && (
        <div className={`toast ${toast.type}`}>
          {toast.message}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
